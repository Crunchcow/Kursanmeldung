{% extends 'courses/base.html' %}
{% load i18n %}

{% block title %}{% trans "Passwort geändert" %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <i class="bi bi-check-circle me-2"></i>{% trans "Passwort geändert" %}
                </h4>
            </div>
            <div class="card-body text-center py-4">
                <div class="mb-3">
                    <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
                </div>
                <p class="mb-4">
                    {% trans "Dein Passwort wurde erfolgreich geändert. Du kannst dich jetzt anmelden." %}
                </p>
                <a href="{% url 'account_login' %}" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right me-1"></i>{% trans "Zur Anmeldung" %}
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
